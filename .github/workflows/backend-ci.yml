# ============================================================
# Backend CI - Build & Test (Spring Boot + Maven)
# ============================================================
name: Backend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "BookStore_Backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "BookStore_Backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BookStore_Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('BookStore_Backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B --no-transfer-progress

      - name: Run tests
        run: ./mvnw test -B --no-transfer-progress
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: BookStore_Backend/target/surefire-reports/
          retention-days: 7

  docker-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: BookStore_Backend/Dockerfile
          failure-threshold: warning
