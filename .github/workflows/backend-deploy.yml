# ============================================================
# Backend CD - Build Docker → Push to ECR → Deploy to EC2
# Frontend is deployed separately on Vercel
# ============================================================
name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "BookStore_Backend/**"
      - "deploy/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
  BACKEND_IMAGE: bookstore-backend

jobs:
  # ──────────────────────────────────────────────
  # Build & Push Docker Image to ECR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        id: build
        working-directory: BookStore_Backend
        run: |
          IMAGE_TAG="${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"

          docker build \
            --cache-from "${IMAGE_LATEST}" \
            -t "${IMAGE_TAG}" \
            -t "${IMAGE_LATEST}" \
            .

          docker push "${IMAGE_TAG}"
          docker push "${IMAGE_LATEST}"

          echo "image=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Deploy to EC2
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml"
          target: "/home/${{ secrets.EC2_USERNAME }}/bookstore"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,BACKEND_IMAGE,IMAGE_TAG
          script: |
            set -e

            echo "========================================="
            echo "Deploying BookStore Backend to EC2..."
            echo "========================================="

            cd /home/${{ secrets.EC2_USERNAME }}/bookstore

            # Login to ECR
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}

            # Pull latest backend image
            echo "Pulling latest backend image..."
            docker pull ${ECR_REGISTRY}/${BACKEND_IMAGE}:${IMAGE_TAG}
            docker tag ${ECR_REGISTRY}/${BACKEND_IMAGE}:${IMAGE_TAG} \
                       ${ECR_REGISTRY}/${BACKEND_IMAGE}:latest

            # Export for docker-compose
            export BACKEND_IMAGE_TAG=${ECR_REGISTRY}/${BACKEND_IMAGE}:latest

            # Deploy
            echo "Updating services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait and verify
            echo "Waiting for services to be healthy..."
            sleep 30
            docker compose -f docker-compose.prod.yml ps

            # Cleanup old images
            docker image prune -af --filter "until=48h" || true

            echo "========================================="
            echo "Backend deployment completed!"
            echo "========================================="

  # ──────────────────────────────────────────────
  # Health Check
  # ──────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for stabilization
        run: sleep 60

      - name: Check Backend Health
        run: |
          for i in 1 2 3; do
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "http://${{ secrets.EC2_HOST }}/api/actuator/health" || echo "000")

            if [ "$response" = "200" ]; then
              echo "Backend is healthy (HTTP $response)"
              exit 0
            fi

            echo "Attempt $i: HTTP $response, retrying in 20s..."
            sleep 20
          done

          echo "Backend is unhealthy after 3 attempts"
          exit 1
