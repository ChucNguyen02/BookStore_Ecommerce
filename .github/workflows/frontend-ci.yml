# ============================================================
# Frontend CI - Build & Lint (Vite + React + TypeScript)
# Deployment is handled automatically by Vercel Git integration
# ============================================================
name: Frontend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "BookStore_Frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "BookStore_Frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BookStore_Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BookStore_Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build production
        run: npm run build
        env:
          VITE_API_BASE_URL: /api
