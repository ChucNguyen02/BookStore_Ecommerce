
services:
  # ============================================
  # Backend (Spring Boot)
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override hosts to use Docker service names
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      # Activate Docker profile for production logging
      SPRING_PROFILES_ACTIVE: docker
      # JVM tuning for container
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - bookstore-network
    volumes:
      - backend_logs:/app/logs

  # ============================================
  # Redis (Cache + Rate Limiting)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bookstore-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookstore-network

  # ============================================
  # RabbitMQ (Message Queue for Email)
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bookstore-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: bookstore
      RABBITMQ_DEFAULT_PASS: bookstore123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - bookstore-network

# ============================================
# Volumes
# ============================================
volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  backend_logs:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  bookstore-network:
    driver: bridge
