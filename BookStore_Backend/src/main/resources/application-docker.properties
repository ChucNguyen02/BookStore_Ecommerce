# ============================================
# Docker / Production Profile
# ============================================
# Override logging for production - less verbose
logging.level.root=INFO
logging.level.chucnguyen.bookstore=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Disable Hibernate SQL show in production
spring.jpa.show-sql=false

# Enable Thymeleaf caching in production
spring.thymeleaf.cache=true

# Disable Swagger in production (uncomment if needed)
# springdoc.swagger-ui.enabled=false
